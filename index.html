<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(233,69,96,0.4);
      animation: bounce 1.5s infinite;
      white-space: nowrap;
      border: none;
    }

    .ios-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f3460;
      color: white;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      white-space: nowrap;
      text-align: center;
      width: 90%;
      max-width: 340px;
    }

    .ios-banner strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      color: #63b3ed;
    }

    .ios-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: transparent;
      border: none;
      color: #a8b2d8;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      animation: none;
      box-shadow: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-6px); }
    }

    .calculator {
      background: #16213e;
      border-radius: 24px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #2d3748;
      border-radius: 10px;
      background: transparent;
      color: #a8b2d8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #e94560;
      color: white;
      border-color: #e94560;
    }

    .display {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: right;
    }

    .display .memory-display {
      color: #63b3ed;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 4px;
    }

    .display .expression {
      color: #a8b2d8;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .sci-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 16px 8px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.8;
    }

    .btn-number { background: #1a1a4e; color: #e2e8f0; }
    .btn-operator { background: #0f3460; color: #63b3ed; }
    .btn-equal { background: #e94560; color: white; }
    .btn-clear { background: #2d3748; color: #fc8181; }
    .btn-special { background: #2d3748; color: #68d391; }
    .btn-memory { background: #1a3a4e; color: #f6ad55; font-size: 13px; padding: 14px 4px; }
    .btn-sci { background: #0d2137; color: #b794f4; font-size: 13px; padding: 14px 4px; }
    .btn-back { background: #2d3748; color: #fc8181; }
    .span-two { grid-column: span 2; }

    .copyright {
      color: #a8b2d8;
      font-size: 11px;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Android Install Button -->
  <button class="install-banner" id="installBtn" onclick="installApp()">
    📲 Install Calculator App
  </button>

  <!-- iOS Install Banner -->
  <div class="ios-banner" id="iosBanner">
    <button class="ios-close" onclick="closeIosBanner()">✕</button>
    <strong>📲 Install on iPhone/iPad</strong>
    Tap the Share button (⬆️) in Safari then tap "Add to Home Screen" to install this app
  </div>

  <div class="calculator">

    <div class="mode-toggle">
      <button class="mode-btn active" id="basicMode" onclick="setMode('basic')">Basic</button>
      <button class="mode-btn" id="sciMode" onclick="setMode('scientific')">Scientific</button>
    </div>

    <div class="display">
      <div class="memory-display" id="memoryDisplay"></div>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="sci-buttons" id="sciButtons" style="display:none">
      <button class="btn-sci" onclick="sciCalc('sin')">sin</button>
      <button class="btn-sci" onclick="sciCalc('cos')">cos</button>
      <button class="btn-sci" onclick="sciCalc('tan')">tan</button>
      <button class="btn-sci" onclick="sciCalc('log')">log</button>
      <button class="btn-sci" onclick="sciCalc('sqrt')">√</button>
      <button class="btn-sci" onclick="sciCalc('square')">x²</button>
      <button class="btn-sci" onclick="sciCalc('pi')">π</button>
      <button class="btn-sci" onclick="sciCalc('inv')">1/x</button>
    </div>

    <div class="sci-buttons" id="memButtons" style="display:none">
      <button class="btn-memory" onclick="memoryClear()">MC</button>
      <button class="btn-memory" onclick="memoryRecall()">MR</button>
      <button class="btn-memory" onclick="memoryAdd()">M+</button>
      <button class="btn-memory" onclick="memorySub()">M-</button>
    </div>

    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percentage()">%</button>
      <button class="btn-operator" onclick="appendOperator('/')">÷</button>

      <button class="btn-number" onclick="appendNumber('7')">7</button>
      <button class="btn-number" onclick="appendNumber('8')">8</button>
      <button class="btn-number" onclick="appendNumber('9')">9</button>
      <button class="btn-operator" onclick="appendOperator('*')">×</button>

      <button class="btn-number" onclick="appendNumber('4')">4</button>
      <button class="btn-number" onclick="appendNumber('5')">5</button>
      <button class="btn-number" onclick="appendNumber('6')">6</button>
      <button class="btn-operator" onclick="appendOperator('-')">−</button>

      <button class="btn-number" onclick="appendNumber('1')">1</button>
      <button class="btn-number" onclick="appendNumber('2')">2</button>
      <button class="btn-number" onclick="appendNumber('3')">3</button>
      <button class="btn-operator" onclick="appendOperator('+')">+</button>

      <button class="btn-number span-two" onclick="appendNumber('0')">0</button>
      <button class="btn-number" onclick="appendDecimal()">.</button>
      <button class="btn-equal" onclick="calculate()">=</button>

      <button class="btn-back span-two" onclick="backspace()">⌫ Backspace</button>
      <button class="btn-special span-two" onclick="clearEntry()">CE</button>
    </div>
  </div>

  <div class="copyright">© 2026 TeaJay Konsult Ltd. All rights reserved.</div>

<script>
  let currentInput = '';
  let expression = '';
  let shouldResetDisplay = false;
  let memory = 0;
  let deferredPrompt = null;

  const resultDisplay = document.getElementById('result');
  const expressionDisplay = document.getElementById('expression');
  const memoryDisplay = document.getElementById('memoryDisplay');
  const installBtn = document.getElementById('installBtn');
  const iosBanner = document.getElementById('iosBanner');

  // Detect iOS
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches;

  if (isIOS && !isInStandaloneMode) {
    iosBanner.style.display = 'block';
  }

  function closeIosBanner() {
    iosBanner.style.display = 'none';
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });

  window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
  });

  async function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') installBtn.style.display = 'none';
    deferredPrompt = null;
  }

  function setMode(mode) {
    document.getElementById('basicMode').classList.toggle('active', mode === 'basic');
    document.getElementById('sciMode').classList.toggle('active', mode === 'scientific');
    document.getElementById('sciButtons').style.display = mode === 'scientific' ? 'grid' : 'none';
    document.getElementById('memButtons').style.display = mode === 'scientific' ? 'grid' : 'none';
  }

  function updateDisplay(value) {
    resultDisplay.textContent = value;
  }

  function appendNumber(num) {
    if (shouldResetDisplay) {
      currentInput = '';
      shouldResetDisplay = false;
    }
    if (currentInput.length >= 12) return;
    currentInput += num;
    updateDisplay(currentInput);
  }

  function appendOperator(op) {
    if (currentInput === '' && expression === '') return;
    if (currentInput !== '') {
      expression += currentInput + op;
      currentInput = '';
    } else {
      expression = expression.slice(0, -1) + op;
    }
    expressionDisplay.textContent = expression.replace(/\*/g, '×').replace(/\//g, '÷');
    updateDisplay('0');
  }

  function appendDecimal() {
    if (shouldResetDisplay) { currentInput = '0'; shouldResetDisplay = false; }
    if (currentInput.includes('.')) return;
    if (currentInput === '') currentInput = '0';
    currentInput += '.';
    updateDisplay(currentInput);
  }

  function calculate() {
    if (currentInput === '' || expression === '') return;
    const fullExpression = expression + currentInput;
    expressionDisplay.textContent = fullExpression.replace(/\*/g, '×').replace(/\//g, '÷') + '=';
    try {
      let res = Function('"use strict"; return (' + fullExpression + ')')();
      res = Math.round(res * 1e10) / 1e10;
      updateDisplay(res);
      currentInput = String(res);
      expression = '';
      shouldResetDisplay = true;
    } catch {
      updateDisplay('Error');
      currentInput = '';
      expression = '';
    }
  }

  function clearAll() {
    currentInput = '';
    expression = '';
    updateDisplay('0');
    expressionDisplay.textContent = '';
  }

  function clearEntry() {
    currentInput = '';
    updateDisplay('0');
  }

  function backspace() {
    if (currentInput.length > 0) {
      currentInput = currentInput.slice(0, -1);
      updateDisplay(currentInput || '0');
    }
  }

  function toggleSign() {
    if (currentInput === '' || currentInput === '0') return;
    currentInput = String(parseFloat(currentInput) * -1);
    updateDisplay(currentInput);
  }

  function percentage() {
    if (currentInput === '') return;
    currentInput = String(parseFloat(currentInput) / 100);
    updateDisplay(currentInput);
  }

  function sciCalc(func) {
    const val = parseFloat(currentInput || '0');
    let res;
    switch(func) {
      case 'sin': res = Math.sin(val * Math.PI / 180); break;
      case 'cos': res = Math.cos(val * Math.PI / 180); break;
      case 'tan': res = Math.tan(val * Math.PI / 180); break;
      case 'log': res = Math.log10(val); break;
      case 'sqrt': res = Math.sqrt(val); break;
      case 'square': res = val * val; break;
      case 'pi': res = Math.PI; break;
      case 'inv': res = 1 / val; break;
    }
    res = Math.round(res * 1e10) / 1e10;
    expressionDisplay.textContent = func + '(' + val + ') =';
    updateDisplay(res);
    currentInput = String(res);
    shouldResetDisplay = true;
  }

  function memoryClear() {
    memory = 0;
    memoryDisplay.textContent = '';
  }

  function memoryRecall() {
    currentInput = String(memory);
    updateDisplay(currentInput);
  }

  function memoryAdd() {
    memory += parseFloat(currentInput || '0');
    memoryDisplay.textContent = 'M = ' + memory;
  }

  function memorySub() {
    memory -= parseFloat(currentInput || '0');
    memoryDisplay.textContent = 'M = ' + memory;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
